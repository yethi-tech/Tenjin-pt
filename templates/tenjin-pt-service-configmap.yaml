apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-tenjin-pt-service-config
  labels:
    app: tenjin-pt-service

data:
  # Database
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "{{ .Values.db.driver }}"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://{{ .Release.Name }}-postgres:5432/{{ .Values.db.database }}"
  SPRING_DATASOURCE_USERNAME: "{{ .Values.db.username }}"
  SPRING_DATASOURCE_PASSWORD: "{{ .Values.db.password }}"

  # InfluxDB
  TENJIN_INFLUX_DB_URL: "{{ .Values.influxdb.url }}"
  TENJIN_INFLUX_DB_TOKEN: "{{ .Values.influxdb.token }}"
  TENJIN_INFLUX_DB_ORG: "{{ .Values.influxdb.org }}"
  TENJIN_INFLUX_DB_BUCKET: "{{ .Values.influxdb.bucket }}"

  # PT Service
  TENJIN_UPLOAD_PATH: "{{ .Values.ptService.uploadPath }}"
  TENJIN_MASTER_PATH: "{{ .Values.ptService.masterPath }}"
  TENJIN_REPORTS_PATH: "{{ .Values.ptService.reportsPath }}"
  TENJIN_CHROME_DRIVER_PATH: "{{ .Values.ptService.chromeDriverPath }}"
  TENJIN_CHROME_BINARY_PATH: "{{ .Values.ptService.chromeBinaryPath }}"
  TENJIN_TEST_CSV_PATH: "{{ .Values.ptService.testCsvPath }}"
  TENJIN_CRON_JOB: "{{ .Values.ptService.cronJob }}"
  TENJIN_EXECUTION_JOB: "{{ .Values.ptService.executionJob }}"
  TENJIN_JTL_PATH: "{{ .Values.ptService.jtlPath }}"

  # Litmus
  TENJIN_LITMUS_SERVICE_URL: "{{ .Values.litmus.serviceUrl }}"
  TENJIN_LITMUS_SERVICE_TOKEN: "{{ .Values.litmus.serviceToken }}"

  # Common
  TENJIN_CHAOS_TESTING: "true"
  TZ: "Asia/Kolkata"