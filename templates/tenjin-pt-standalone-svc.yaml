apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-tenjin-pt-standalone
  labels:
    app: {{ .Release.Name }}-tenjin-pt-standalone
spec:
  type: {{ .Values.tenjinStandalone.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Release.Name }}-tenjin-pt-standalone
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.tenjinStandalone.service.port | default 80 }}
      targetPort: {{ .Values.tenjinStandalone.service.targetPort | default 8080 }}