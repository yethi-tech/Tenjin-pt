apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-tenjin-pt-service
  labels:
    app: {{ .Release.Name }}-tenjin-pt-service
spec:
  type: {{ .Values.ptService.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Release.Name }}-tenjin-pt-service
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.ptService.service.port | default 8080 }}
      targetPort: {{ .Values.ptService.service.targetPort | default 8080 }}