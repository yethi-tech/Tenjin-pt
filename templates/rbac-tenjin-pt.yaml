---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-pt-service-sa
  labels:
    app: {{ .Release.Name }}-pt-service

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-pt-service-role
  labels:
    app: {{ .Release.Name }}-pt-service

rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - services
      - endpoints
      - configmaps
      - secrets
      - persistentvolumeclaims
      - events
      - namespaces
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-pt-service-rolebinding
  labels:
    app: {{ .Release.Name }}-pt-service

subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-pt-service-sa
    namespace: {{ .Release.Namespace }}

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-pt-service-role