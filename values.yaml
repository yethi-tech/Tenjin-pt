db:
  POSTGRES_DB: tenjin
  driver: org.postgresql.Driver
  username: postgres
  password: postgres
  database: tenjin
  type: postgres
  accessMode: ReadWriteOnce
  storageClassName: gp3
  size: 20Gi

influxdb:
  url: <influxdb_url>
  token: <influxdb_token>
  org: Yethi
  bucket: jmeter

ptService:
  image: yethitech/tenjin-pt-service:2.2.0

  persistence:
    size: 20Gi
    storageClassName: efs-sc

  uploadPath: /root/testcase/
  masterPath: /root/tenjinpt-prod-master-pv
  reportsPath: /root/test_reports/
  chromeDriverPath: /root/driver/chromedriver-linux64/chromedriver
  chromeBinaryPath: /root/driver/chrome-linux64/chrome
  testCsvPath: /root/testcase/splitcsv
  cronJob: tenjinpt-prod-tenjin-pulse-master
  executionJob: exec-tenjinpt-prod-master-job
  jtlPath: /app/jtl-storage/10202/results.jtl
  masterPvcName: <release-name>-tenjin-shared-pvc>
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

litmus:
  serviceUrl: http://<litmus-ip>:<litmus-port>
  serviceToken: <litmus-token>

tenjinStandalone:
  image: yethitech/tenjin-pt-standalone:2.2.0
  baseUrl: <tenjin-standalone-url>
  mailHost: smtp.office365.com
  mailPort: 587
  mailUsername: ""
  mailPassword: "1C3cr$%cr3am"
  chaosTesting: true
  timezone: Asia/Kolkata
  cookieHttp: false
  cookieSecure: false
  cookieSite: strict

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080