db:
  jtlPersistence:
    storageClassName: efs-sc
    size: 5Gi
  POSTGRES_DB: tenjin
  driver: org.postgresql.Driver
  url: jdbc:postgresql://tenjin_db:5432/${POSTGRES_DB}
  username: postgres
  password: postgres
  database: tenjin
  type: postgres

influxdb:
  url: <influxdb_url>
  token: <influxdb_token>
  org: Yethi
  bucket: jmeter

ptService:
  image: yethitech/tenjin-pt-service:2.2.0

  persistence:
    size: 20Gi
    storageClassName: efs-sc

  uploadPath: /root/testcase/
  masterPath: /root/tenjinpt-prod-master-pv
  reportsPath: /root/test_reports/
  chromeDriverPath: /root/driver/chromedriver-linux64/chromedriver
  chromeBinaryPath: /root/driver/chrome-linux64/chrome
  testCsvPath: /root/testcase/splitcsv
  cronJob: tenjinpt-prod-tenjin-pulse-master
  executionJob: exec-tenjinpt-prod-master-job
  jtlPath: /app/jtl-storage/10202/results.jtl

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

litmus:
  serviceUrl: http://<litmus-ip>:<litmus-port>
  serviceToken: <litmus-token>

tenjinStandalone:
  image: yethitech/tenjin-standalone:2.2.0
  baseUrl: <tenjin-standalone-url>
  mailHost: smtp.office365.com
  mailPort: 587
  mailUsername: ""
  mailPassword: "1C3cr$%cr3am"
  chaosTesting: true
  timezone: Asia/Kolkata
  cookieHttp: false
  cookieSecure: false
  cookieSite: strict
  ptServiceUrl: http://tpt-service:8080/api

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080